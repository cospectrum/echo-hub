[project]
name = "nlp-worker"
version = "0.1.0"
description = "nlp worker"
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "common",
    "pika>=1.3.2",
    "psycopg-pool>=3.2.5",
    "psycopg[binary]>=3.2.5",
    "pydantic>=2.10.6",
    "pydantic-settings>=2.8.0",
]

[tool.uv.sources]
common = { workspace = true }

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[dependency-groups]
dev = [
    "types-boto3[essential]>=1.37.0",
]
